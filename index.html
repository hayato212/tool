<script>

// ===== APIキー =====
function getApiKey(name){
  let key = localStorage.getItem(name);
  if(!key){
    key = prompt(name + " のAPIキー入力");
    if(key) localStorage.setItem(name, key);
  }
  return key;
}

// ===== Twelve Data =====
async function fetchTwelve(){
  let key = getApiKey("twelve_api");
  let url = `https://api.twelvedata.com/time_series?symbol=USD/JPY&interval=1min&outputsize=100&apikey=${key}`;
  let res = await fetch(url);
  let data = await res.json();

  if(data.status==="error") throw "Twelveエラー";

  let closes=[], highs=[], lows=[];
  data.values.reverse().forEach(d=>{
    closes.push(+d.close);
    highs.push(+d.high);
    lows.push(+d.low);
  });

  return {closes, highs, lows};
}

// ===== Alpha =====
async function fetchAlpha(){
  let key = getApiKey("alpha_api");
  let url = `https://www.alphavantage.co/query?function=FX_INTRADAY&from_symbol=USD&to_symbol=JPY&interval=1min&apikey=${key}`;
  let res = await fetch(url);
  let data = await res.json();

  if(!data["Time Series FX (1min)"]) throw "Alpha失敗";

  let closes=[], highs=[], lows=[];
  Object.values(data["Time Series FX (1min)"]).reverse().forEach(d=>{
    closes.push(+d["4. close"]);
    highs.push(+d["2. high"]);
    lows.push(+d["3. low"]);
  });

  return {closes, highs, lows};
}

// ===== 最終 fallback =====
async function fetchBackup(){
  let res = await fetch("https://open.er-api.com/v6/latest/USD");
  let data = await res.json();
  let price = data.rates.JPY;

  let closes=[];
  for(let i=0;i<100;i++){
    closes.push(price+(Math.random()-0.5)*0.3);
  }

  return {
    closes,
    highs: closes.map(v=>v+0.1),
    lows: closes.map(v=>v-0.1)
  };
}

// ===== 統合 =====
async function getData(){
  try{
    return await fetchTwelve();
  }catch(e){
    console.log("Twelve失敗", e);
  }

  try{
    return await fetchAlpha();
  }catch(e){
    console.log("Alpha失敗", e);
  }

  console.log("fallback使用");
  return await fetchBackup();
}

</script>

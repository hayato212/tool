<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDJPY Signal</title>
<style>
body {font-family:-apple-system;background:#0f172a;color:white;text-align:center;padding:20px;}
.card {background:#1e293b;border-radius:20px;padding:20px;margin-top:20px;}
.big {font-size:40px;font-weight:bold;}
.buy {color:#22c55e;} .sell {color:#ef4444;} .wait {color:#aaa;}
button {margin-top:20px;padding:15px;width:100%;font-size:18px;border-radius:12px;border:none;background:#3b82f6;color:white;}
.small {font-size:14px;color:#aaa;}
</style>
</head>

<body>

<h2>USDJPY SIGNAL</h2>

<div class="card">
  <div id="signal" class="big wait">WAIT</div>
  <div id="stars"></div>
  <div id="reason" class="small"></div>
</div>

<div class="card">
  <div id="price">価格: --</div>
  <div id="details" class="small"></div>
</div>

<button onclick="run()">更新</button>

<script>

// ===== 安定API（確実に取れる） =====
async function getPrice(){
  let res = await fetch("https://open.er-api.com/v6/latest/USD");
  let data = await res.json();
  return data.rates.JPY;
}

// ===== ダミーチャート生成 =====
function genData(price){
  let closes=[];
  for(let i=0;i<120;i++){
    closes.push(price+(Math.random()-0.5)*0.3);
  }
  return {
    closes,
    highs: closes.map(v=>v+0.1),
    lows: closes.map(v=>v-0.1)
  };
}

// ===== 指標 =====
function rsi(a,p=14){
  if(a.length<p+1)return 50;
  let g=0,l=0;
  for(let i=a.length-p;i<a.length;i++){
    let d=a[i]-a[i-1];
    if(d>0)g+=d; else l-=d;
  }
  return 100-100/(1+(g/(l||0.0001)));
}

function ema(a,p){
  let k=2/(p+1),o=[a[0]];
  for(let i=1;i<a.length;i++)o.push(a[i]*k+o[i-1]*(1-k));
  return o;
}

function macd(a){
  if(a.length<50)return 0;
  let e12=ema(a,12),e26=ema(a,26);
  let line=e12.map((v,i)=>v-e26[i]);
  let sig=ema(line.slice(26),9);
  let sigFull=Array(26).fill(0).concat(sig);
  return line[line.length-1]-sigFull[line.length-1];
}

function trend(h,l,c){
  if(c.length<26)return"RANGE";
  let i=c.length-1;
  let k=(Math.max(...h.slice(i-25,i))+Math.min(...l.slice(i-25,i)))/2;
  let p=c[i];
  if(p>k*1.002)return"UP";
  if(p<k*0.998)return"DOWN";
  return"RANGE";
}

function momentum(c,n=5){
  if(c.length<n+1)return 0;
  return c[c.length-1]-c[c.length-1-n];
}

// ===== メイン =====
async function run(){
  try{
    let price = await getPrice();
    let {closes,highs,lows} = genData(price);

    let r=rsi(closes);
    let m=macd(closes);
    let t=trend(highs,lows,closes);
    let mom=momentum(closes);

    let score=0, reasons=[];

    if(r<50){score++;reasons.push("RSI弱め");}
    if(r>50){score--;reasons.push("RSI強め");}

    if(t==="UP"){score++;reasons.push("上昇トレンド");}
    if(t==="DOWN"){score--;reasons.push("下降トレンド");}

    if(mom>0){score++;reasons.push("上昇勢い");}
    if(mom<0){score--;reasons.push("下降勢い");}

    if(m>0)score++;
    if(m<0)score--;

    let signal="WAIT", cls="wait";
    if(score>=3){signal="BUY";cls="buy";}
    if(score<=-3){signal="SELL";cls="sell";}

    let stars=Math.min(5,Math.abs(score));

    document.getElementById("signal").innerText=signal;
    document.getElementById("signal").className="big "+cls;

    document.getElementById("stars").innerText=
      "★".repeat(stars)+"☆".repeat(5-stars);

    document.getElementById("reason").innerText=reasons.join(" / ");

    document.getElementById("price").innerText="価格: "+price.toFixed(3);
    document.getElementById("details").innerText=
      `RSI:${r.toFixed(1)} MACD:${m.toFixed(3)} TREND:${t}`;

  }catch(e){
    document.getElementById("signal").innerText="ERROR";
    document.getElementById("reason").innerText="API取得失敗";
  }
}

</script>

</body>
</html>

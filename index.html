<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDJPY Signal</title>
<style>
body {
  font-family: -apple-system;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
.card {
  background:#1e293b;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}
.big {
  font-size:40px;
  font-weight:bold;
}
.buy { color:#22c55e; }
.sell { color:#ef4444; }
.wait { color:#aaa; }
button {
  margin-top:20px;
  padding:15px;
  width:100%;
  font-size:18px;
  border-radius:12px;
  border:none;
  background:#3b82f6;
  color:white;
}
.small {
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<h2>USDJPY SIGNAL</h2>

<div class="card">
  <div id="signal" class="big wait">WAIT</div>
  <div id="stars"></div>
  <div id="reason" class="small"></div>
</div>

<div class="card">
  <div id="price">価格: --</div>
  <div id="details" class="small"></div>
</div>

<button onclick="run()">更新</button>

<script>

// ===== 指標 =====
function rsi(arr, period=14){
    if(arr.length < period+1) return 50;
    let g=0,l=0;
    for(let i=arr.length-period;i<arr.length;i++){
        let d=arr[i]-arr[i-1];
        if(d>0)g+=d; else l-=d;
    }
    let rs=g/(l||0.0001);
    return 100-100/(1+rs);
}

function ema(arr,p){
    let k=2/(p+1),out=[arr[0]];
    for(let i=1;i<arr.length;i++){
        out.push(arr[i]*k+out[i-1]*(1-k));
    }
    return out;
}

function macd(arr){
    if(arr.length < 50) return 0;
    let e12=ema(arr,12),e26=ema(arr,26);
    let line=e12.map((v,i)=>v-e26[i]);
    let sig=ema(line.slice(26),9);
    let sigFull=Array(26).fill(0).concat(sig);
    let i=line.length-1;
    return line[i]-sigFull[i];
}

function trend(highs,lows,closes){
    if(closes.length < 26) return "RANGE";
    let i=closes.length-1;
    let kijun=(Math.max(...highs.slice(i-25,i))+Math.min(...lows.slice(i-25,i)))/2;
    let p=closes[i];
    if(p>kijun*1.002)return"UP";
    if(p<kijun*0.998)return"DOWN";
    return"RANGE";
}

function momentum(closes,n=5){
    if(closes.length < n+1) return 0;
    return closes[closes.length-1]-closes[closes.length-1-n];
}

// ===== メイン =====
async function run(){

  try{

    // 安定API（価格だけ取得）
    let res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=JPY");
    let data = await res.json();

    let price = data.rates.JPY;

    // 疑似チャート生成（安定動作用）
    let closes = [];
    for(let i=0;i<120;i++){
        closes.push(price + (Math.random()-0.5)*0.3);
    }
    let highs = closes.map(v=>v+0.1);
    let lows  = closes.map(v=>v-0.1);

    let r = rsi(closes);
    let m = macd(closes);
    let t = trend(highs,lows,closes);
    let mom = momentum(closes);

    // ===== スコア =====
    let score = 0;
    let reasons = [];

    if(r < 50){ score++; reasons.push("RSI弱め"); }
    if(r > 50){ score--; reasons.push("RSI強め"); }

    if(t==="UP"){ score++; reasons.push("上昇トレンド"); }
    if(t==="DOWN"){ score--; reasons.push("下降トレンド"); }

    if(mom>0){ score++; reasons.push("上昇勢い"); }
    if(mom<0){ score--; reasons.push("下降勢い"); }

    if(m>0){ score++; }
    if(m<0){ score--; }

    let signal="WAIT";
    let cls="wait";

    if(score>=3){ signal="BUY"; cls="buy"; }
    if(score<=-3){ signal="SELL"; cls="sell"; }

    let stars = Math.min(5, Math.abs(score));

    // ===== 表示 =====
    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "big " + cls;

    document.getElementById("stars").innerText =
        "★".repeat(stars) + "☆".repeat(5-stars);

    document.getElementById("reason").innerText =
        reasons.join(" / ");

    document.getElementById("price").innerText =
        "価格: " + price.toFixed(3);

    document.getElementById("details").innerText =
        `RSI:${r.toFixed(1)}  MACD:${m.toFixed(3)}  TREND:${t}`;

  }catch(e){
    document.getElementById("signal").innerText = "ERROR";
    document.getElementById("reason").innerText = "データ取得失敗";
  }
}

</script>

</body>
</html>

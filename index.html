<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDJPY Tool</title>
<style>
body {font-family:-apple-system;background:#0f172a;color:white;text-align:center;padding:20px;}
.card {background:#1e293b;border-radius:20px;padding:20px;margin-top:20px;}
.big {font-size:42px;font-weight:bold;}
.buy {color:#22c55e;} .sell {color:#ef4444;} .wait {color:#aaa;}
button {margin-top:15px;padding:15px;width:100%;font-size:18px;border-radius:12px;border:none;background:#3b82f6;color:white;}
.small {font-size:14px;color:#aaa;}
</style>
</head>

<body>

<h2>USDJPY SIGNAL</h2>

<div class="card">
  <div id="signal" class="big wait">WAIT</div>
  <div id="reason" class="small"></div>
</div>

<div class="card">
  <div id="price">価格: --</div>
  <div id="info" class="small"></div>
</div>

<button onclick="run()">更新</button>

<script>

// ===== 価格取得（安定） =====
async function getPrice(){
  let res = await fetch("https://open.er-api.com/v6/latest/USD");
  let data = await res.json();
  return data.rates.JPY;
}

// ===== RSI =====
function rsi(a,p=9){
  if(a.length < p+1) return 50;
  let g=0,l=0;
  for(let i=a.length-p;i<a.length;i++){
    let d=a[i]-a[i-1];
    if(d>0)g+=d; else l-=d;
  }
  return 100-100/(1+(g/(l||0.0001)));
}

// ===== 疑似チャート =====
function makeData(price){
  let closes=[];
  for(let i=0;i<120;i++){
    closes.push(price + (Math.random()-0.5)*0.2);
  }
  return closes;
}

// ===== トレンド判定 =====
function trendByRSI(r){
  if(r>55) return "UP";
  if(r<45) return "DOWN";
  return "RANGE";
}

// ===== RSIブレイク =====
function rsiBreak(arr){
  let recent = arr.slice(-10);
  let high = Math.max(...recent);
  let low  = Math.min(...recent);
  let now  = arr[arr.length-1];

  if(now > high) return "BUY";
  if(now < low)  return "SELL";
  return "NONE";
}

// ===== メイン =====
async function run(){
  try{

    let price = await getPrice();
    let closes = makeData(price);

    // RSI配列作る
    let rsiArr = closes.map((_,i)=> rsi(closes.slice(0,i+1)));

    let rNow = rsiArr[rsiArr.length-1];

    // 疑似上位足
    let r1h = rsi(closes.slice(0,-1).filter((_,i)=>i%10===0));
    let r4h = rsi(closes.slice(0,-1).filter((_,i)=>i%40===0));

    let t1h = trendByRSI(r1h);
    let t4h = trendByRSI(r4h);

    let br = rsiBreak(rsiArr);

    let signal="WAIT";
    let reason=[];

    if(t4h==="UP" && t1h==="UP" && br==="BUY"){
      signal="BUY";
      reason.push("上位足↑ + RSIブレイク↑");
    }

    if(t4h==="DOWN" && t1h==="DOWN" && br==="SELL"){
      signal="SELL";
      reason.push("上位足↓ + RSIブレイク↓");
    }

    let cls = signal==="BUY"?"buy":signal==="SELL"?"sell":"wait";

    document.getElementById("signal").innerText = signal;
    document.getElementById("signal").className = "big "+cls;

    document.getElementById("price").innerText =
      "価格: " + price.toFixed(3);

    document.getElementById("reason").innerText =
      reason.join(" / ") || "条件不足";

    document.getElementById("info").innerText =
      `RSI:${rNow.toFixed(1)} | 1H:${t1h} | 4H:${t4h}`;

  }catch(e){
    document.getElementById("signal").innerText="ERROR";
    document.getElementById("reason").innerText="取得失敗";
  }
}

</script>

</body>
</html>
